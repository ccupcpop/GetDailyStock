name: 每日台股分析-Gmail通知

on:
  schedule:
    # 每天 UTC 09:15 执行 = 台湾时间下午 17:15 (UTC+8)
    - cron: '0 8 * * *'
  
  workflow_dispatch:

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk chromium-browser chromium-chromedriver
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Ensure data directories exist
        run: |
          mkdir -p StockTSEHTML StockOTCHTML StockInfo StockTSEHistory StockOTCHistory
      
      - name: Run stock analysis
        env:
          TZ: 'Asia/Taipei'
          DEBUG_MODE: 'false'  # 改成 'true' 启用除错模式 (跳过爬虫和 History)
        run: |
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "⚡ 除错模式:跳过爬虫和 History 生成"
            python stock_workflow.py --debug-skip-data-processing --copy-to-repo
          else
            echo "🚀 完整流程模式"
            python stock_workflow.py --copy-to-repo
          fi
      
      - name: Verify files in StockInfo directory
        run: |
          echo "📦 检查 StockInfo 资料夹的档案..."
          
          # 检查 StockInfo 资料夹
          if [ -d "StockInfo" ]; then
            echo "📋 StockInfo 资料夹内容:"
            ls -lh StockInfo/
          else
            echo "❌ StockInfo 资料夹不存在!"
          fi
          
          # 检查数据库文件
          echo ""
          echo "📦 检查数据库文件..."
          if [ -f "StockTSEHistory/stock_tse.db" ]; then
            echo "✅ stock_tse.db 存在 ($(ls -lh StockTSEHistory/stock_tse.db | awk '{print $5}'))"
          else
            echo "⚠️  stock_tse.db 不存在"
          fi
          
          if [ -f "StockOTCHistory/stock_otc.db" ]; then
            echo "✅ stock_otc.db 存在 ($(ls -lh StockOTCHistory/stock_otc.db | awk '{print $5}'))"
          else
            echo "⚠️  stock_otc.db 不存在"
          fi
      
      - name: Package analysis results
        run: |
          # 创建日期标记
          DATE=$(TZ=Asia/Taipei date +'%Y%m%d')
          DATETIME=$(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')
          
          # 打包所有分析结果
          mkdir -p release_package
          
          # 复制 Excel 报表（从 StockInfo 目录）
          cp -f StockInfo/*.xlsx release_package/ 2>/dev/null || true
          
          # 复制 HTML 图表（从 StockInfo 目录）
          cp -f StockInfo/*.html release_package/ 2>/dev/null || true
          
          # 检查是否有文件
          if [ -z "$(ls -A release_package 2>/dev/null)" ]; then
            echo "⚠️  警告: release_package 目录为空，没有文件可以打包"
            echo "📂 StockInfo 目录内容:"
            ls -lh StockInfo/ 2>/dev/null || echo "StockInfo 目录不存在"
            # 创建一个空的 zip 文件以避免后续步骤失败
            touch release_package/README.txt
            echo "本次执行未生成分析文件" > release_package/README.txt
          fi
          
          # 创建压缩档
          cd release_package
          zip -r ../stock-analysis-${DATE}.zip . -x "*.git*"
          cd ..
          
          echo "DATE=${DATE}" >> $GITHUB_ENV
          echo "DATETIME=${DATETIME}" >> $GITHUB_ENV
          
          # 显示打包内容
          echo "打包内容:"
          unzip -l stock-analysis-${DATE}.zip | head -20
      
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: analysis-${{ env.DATE }}
          name: 股票分析报告 ${{ env.DATETIME }}
          body: |
            ## 📊 台股分析报告
            
            **分析时间:** ${{ env.DATETIME }}
            
            ### 📦 下载内容
            - ✅ 上市分析报表 (tse_analysis_result.xlsx)
            - ✅ 上柜分析报表 (otc_analysis_result.xlsx)
            - ✅ 所有 HTML 互动图表
            - ✅ 所有 PNG 静态图表
            
            ### 📈 分析指标
            - 成交量异常分析
            - 法人买卖超统计
            - 涨跌幅排行
            - 技术指标分析
            
            ---
            
            ⚠️ 此 release 会在 30 天后自动删除
          files: |
            StockInfo/tse_analysis_result.xlsx
            StockInfo/otc_analysis_result.xlsx
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get Release URL
        run: |
          REPO="${{ github.repository }}"
          TAG="analysis-${{ env.DATE }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          echo "RELEASE_URL=${RELEASE_URL}" >> $GITHUB_ENV
          echo "🔎 Release URL: ${RELEASE_URL}"
      
      - name: Remove source code archives from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: analysis-${{ env.DATE }}
        run: |
          # 等待 release 完全创建
          sleep 5
          
          # 使用 GitHub API 删除 source code 压缩档
          REPO="${{ github.repository }}"
          
          # 获取 release ID
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}" | \
            jq -r '.id')
          
          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            # 获取所有 assets
            ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets")
            
            # 删除 source code 压缩档
            echo "$ASSETS" | jq -r '.[] | select(.name | test("^(Source code|源代码).*\\.(zip|tar\\.gz)$")) | .id' | while read asset_id; do
              if [ -n "$asset_id" ]; then
                echo "🗑️  删除 source code asset: $asset_id"
                curl -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/${REPO}/releases/assets/${asset_id}"
              fi
            done
            
            echo "✅ 已移除 source code 压缩档"
          else
            echo "⚠️  找不到 release ID"
          fi
      
      - name: Commit stock data to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "📋 准备提交的档案列表:"
          echo ""
          
          # 检查档案是否存在
          echo "🔍 检查 StockInfo 资料夹的档案:"
          ls -lh StockInfo/ || echo "⚠️  StockInfo 资料夹不存在"
          echo ""
          
          # 强制加入所有档案(使用 --force 忽略 .gitignore)
          echo "📦 加入档案到 Git staging area..."
          
          # 加入 CSV 原始资料
          git add -f StockTSEDaily/*.csv 2>/dev/null || true
          git add -f StockTSEShares/*.csv 2>/dev/null || true
          git add -f StockOTCDaily/*.csv 2>/dev/null || true
          git add -f StockOTCShares/*.csv 2>/dev/null || true
          
          # 🆕 加入数据库文件
          echo "📦 加入数据库文件..."
          git add -f StockTSEHistory/stock_tse.db 2>/dev/null || true
          git add -f StockOTCHistory/stock_otc.db 2>/dev/null || true
          git add -f StockInfo/stock_tse_all.db 2>/dev/null || true
          git add -f StockInfo/stock_otc_all.db 2>/dev/null || true
          
          # 加入 StockInfo 资料夹的所有档案
          echo "📦 加入 StockInfo 资料夹的档案..."
          
          # 不带日期的档案
          git add -f StockInfo/tse_analysis_result.xlsx 2>/dev/null || true
          git add -f StockInfo/otc_analysis_result.xlsx 2>/dev/null || true
          git add -f StockInfo/tse_analysis_result_complete.html 2>/dev/null || true
          git add -f StockInfo/otc_analysis_result_complete.html 2>/dev/null || true
          git add -f StockInfo/ALL_TSE.html 2>/dev/null || true
          git add -f StockInfo/ALL_OTC.html 2>/dev/null || true
          git add -f StockInfo/TSE_buy_ranking.txt 2>/dev/null || true
          git add -f StockInfo/OTC_buy_ranking.txt 2>/dev/null || true
          
          # 保险措施:确保所有 HTML 都被加入
          git add -f StockInfo/*.html 2>/dev/null || true
          
          echo ""
          echo "📦 Git staging area 中的档案:"
          git diff --staged --name-status
          echo ""
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "❌ 没有档案变更,跳过提交"
            echo ""
            echo "🔍 除错资讯:"
            echo "StockInfo 目录内容:"
            ls -la StockInfo/ 2>/dev/null || echo "StockInfo 不存在"
            echo ""
            echo "数据库文件:"
            ls -lh StockTSEHistory/stock_tse.db StockOTCHistory/stock_otc.db 2>/dev/null || echo "History 数据库文件不存在"
            ls -lh StockInfo/stock_tse_all.db StockInfo/stock_otc_all.db 2>/dev/null || echo "StockInfo 数据库文件不存在"
            echo ""
            echo "Git 状态:"
            git status
          else
            echo "✅ 发现档案变更,准备提交..."
            echo ""
            
            # 提交并推送
            git commit -m "📊 更新股票资料与数据库 $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
            git push
            
            echo ""
            echo "✅ 成功推送资料到 repository"
            echo ""
            echo "📂 已更新的档案:"
            git diff HEAD~1 --name-only | while read file; do
              echo "   ✓ $file"
            done
          fi
      
      - name: Clean old releases (keep last 30 days)
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 7
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}